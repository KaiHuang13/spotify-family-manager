name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate public Supabase build variables
        shell: bash
        run: |
          missing=()

          if [[ -z "$VITE_SUPABASE_URL" ]]; then
            missing+=("VITE_SUPABASE_URL")
          fi

          if [[ -z "$VITE_SUPABASE_ANON_KEY" ]]; then
            missing+=("VITE_SUPABASE_ANON_KEY")
          fi

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing GitHub Environment or Repository Variables: ${missing[*]}"
            exit 1
          fi

          node --input-type=module <<'NODE'
          const key = process.env.VITE_SUPABASE_ANON_KEY

          if (key.startsWith('sb_secret_')) {
            console.error(
              '::error::VITE_SUPABASE_ANON_KEY must not use a Supabase secret key.',
            )
            process.exit(1)
          }

          const jwtParts = key.split('.')

          if (jwtParts.length === 3) {
            try {
              const payload = JSON.parse(
                Buffer.from(jwtParts[1], 'base64url').toString('utf8'),
              )

              if (payload.role === 'service_role') {
                console.error(
                  '::error::VITE_SUPABASE_ANON_KEY must not use a service_role key.',
                )
                process.exit(1)
              }
            } catch {
              // A malformed key will be rejected by Supabase at runtime.
            }
          }
          NODE

      - name: Build application
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
